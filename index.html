<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sql Select</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <p class="snackbar">Successfully Copied</p>
  <div class="wrapper">
    <div class="navbar">
      <div class="navTabs">
        <button class="tabs" data-tab="sql">SQL</button>
        <button style="display: none;" class="tabs" data-tab="regex">Regex PG</button>
        <button class="tabs" data-tab="maker">Maker</button>
      </div>
      <div class="navActionsItems">
        <a href="https://github.com/naveengitboi" target="_blank" ><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="icon icon-tabler icons-tabler-filled icon-tabler-brand-github"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M5.315 2.1c.791 -.113 1.9 .145 3.333 .966l.272 .161l.16 .1l.397 -.083a13.3 13.3 0 0 1 4.59 -.08l.456 .08l.396 .083l.161 -.1c1.385 -.84 2.487 -1.17 3.322 -1.148l.164 .008l.147 .017l.076 .014l.05 .011l.144 .047a1 1 0 0 1 .53 .514a5.2 5.2 0 0 1 .397 2.91l-.047 .267l-.046 .196l.123 .163c.574 .795 .93 1.728 1.03 2.707l.023 .295l.007 .272c0 3.855 -1.659 5.883 -4.644 6.68l-.245 .061l-.132 .029l.014 .161l.008 .157l.004 .365l-.002 .213l-.003 3.834a1 1 0 0 1 -.883 .993l-.117 .007h-6a1 1 0 0 1 -.993 -.883l-.007 -.117v-.734c-1.818 .26 -3.03 -.424 -4.11 -1.878l-.535 -.766c-.28 -.396 -.455 -.579 -.589 -.644l-.048 -.019a1 1 0 0 1 .564 -1.918c.642 .188 1.074 .568 1.57 1.239l.538 .769c.76 1.079 1.36 1.459 2.609 1.191l.001 -.678l-.018 -.168a5.03 5.03 0 0 1 -.021 -.824l.017 -.185l.019 -.12l-.108 -.024c-2.976 -.71 -4.703 -2.573 -4.875 -6.139l-.01 -.31l-.004 -.292a5.6 5.6 0 0 1 .908 -3.051l.152 -.222l.122 -.163l-.045 -.196a5.2 5.2 0 0 1 .145 -2.642l.1 -.282l.106 -.253a1 1 0 0 1 .529 -.514l.144 -.047l.154 -.03z" /></svg></a>
      </div>
    </div>
    <div class="heroSection">
      <div class="inputsSection">
        <div class="sqlTab activeTab" data-tab="sql">
          <div class="inputsContainer">
            <div class="input">
              <p>DB Name</p>
              <input class="dbInput" type="text" placeholder="eg: MART_DB" name="db"></input>
            </div>
            <div class="input">
              <p>Schema Name</p>
              <input class="schemaInput" type="text" placeholder="eg: RAW_SCHEMA" name="schema"></input>
            </div>
            <div class="input">
              <p>Table Name</p>
              <input class="tableInput" type="text" placeholder="eg: CUSTOMERS" name="table"></input>
            </div>
            <div class="input">
              <p>Append Data Type</p>
              <input class="appendDataType" type="text" placeholder="eg: varchar(1661717)" name="dataType"></input>
            </div>
            <div class="input">
              <p>Columns</p>
              <textarea class="columnsInput" type="text" placeholder="Columns" name="columnsList"></textarea>
            </div>
            <div class="input">
              <p>Values</p>
              <textarea class="valuesInput" type="text" placeholder="Values In format" name="values"></textarea>
            </div>
            <div class="input userOperations">
              <div class="">
                <p for="insert">Insert into?</p>
                <input id="insert" class="operations" type="checkbox" name="insert"></input>
              </div>
              <div class="">
                <p for="newLine">new line?</p>
                <input id="newLine" class="operations" type="checkbox" name="newLine"></input>
              </div>
            </div>
            <div class="input">
              <p>Seperator</p>
              <input class="seperator" type="text" placeholder="eg: , | ' ' | any other" name="seperator"></input>
            </div>
          </div>
          <button class="button generateBtn">Generate SQL</button>

          <div class="replaceTxtSection">
            <textarea name="content" class="replaceTxt replaceInput" id="" placeholder="Enter Txt"></textarea>
            <div class="replaceActions">
              <input type="text" placeholder="Write Regex" class="replaceSource replaceInput" name="source">
              <input type="text" placeholder="Replace With" class="replaceWith replaceInput" name="target">
              <input type="text" placeholder="gi(default)" class="params replaceInput" name="params">
              <div class="replaceActionsBtns">
                <button class="replaceBtn button">Replace</button>
                <button class="searchBtn button">Search</button>
              </div>
            </div>
          </div>
        </div>

        <div class="profilingTab inActiveTab" data-tab="regex">
          <div class="comparisions">
            <textarea name="compSource" id="" class="compareInputs"></textarea>
            <textarea name="compTarget" id="" class="compareInputs"></textarea>
          </div>
          <div class="compActions">
            <button class="button compareBtn">Compare</button>
          </div>
        </div>

        <div class="makerTab inActiveTab" data-tab="maker">
          <div class="template_creator">
            <textarea name="template" id="" class="templateInput" placeholder="Prepare Template here"></textarea>
            <!-- <input type="text" name="times" placeholder="Times?"> -->

            <div class="repInputContainer">
            </div>

            <div>
              <button class="button addVariableBtn">Add Variable</button>
              <input type="text" name="joinWith" class="joinWith"
                    placeholder="join with? ,(Default) | \n(new line)" />
            </div>
          </div>

          <div class="makerActionContainer">
            <button class="button makerActionBtn">Make It</button>
          </div>

        </div>




      </div>


      <div class="resultContianer">
        <div class="outputsTxt">
          <div class=" outputActionsContainer">
            <p>Output</p>
            <div class="outputActions">
              <div class="outputActionBtn copyBtn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5}
                  stroke="currentColor" className="size-6">
                  <path strokeLinecap="round" strokeLinejoin="round"
                    d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184" />
                </svg>
              </div>
              <div class="outputActionBtn cutBtn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5}
                  stroke="currentColor" className="size-6">
                  <path strokeLinecap="round" strokeLinejoin="round"
                    d="m7.848 8.25 1.536.887M7.848 8.25a3 3 0 1 1-5.196-3 3 3 0 0 1 5.196 3Zm1.536.887a2.165 2.165 0 0 1 1.083 1.839c.005.351.054.695.14 1.024M9.384 9.137l2.077 1.199M7.848 15.75l1.536-.887m-1.536.887a3 3 0 1 1-5.196 3 3 3 0 0 1 5.196-3Zm1.536-.887a2.165 2.165 0 0 0 1.083-1.838c.005-.352.054-.695.14-1.025m-1.223 2.863 2.077-1.199m0-3.328a4.323 4.323 0 0 1 2.068-1.379l5.325-1.628a4.5 4.5 0 0 1 2.48-.044l.803.215-7.794 4.5m-2.882-1.664A4.33 4.33 0 0 0 10.607 12m3.736 0 7.794 4.5-.802.215a4.5 4.5 0 0 1-2.48-.043l-5.326-1.629a4.324 4.324 0 0 1-2.068-1.379M14.343 12l-2.882 1.664" />
                </svg>

              </div>
            </div>
          </div>
          <textarea class="output"></textarea>

        </div>

        <div class="outputsTxt">
          <div class=" outputActionsContainer">
            <p>Use This as Rough</p>
            <div class="outputActions">
              <div class="outputActionBtn copyBtn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5}
                  stroke="currentColor" className="size-6">
                  <path strokeLinecap="round" strokeLinejoin="round"
                    d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184" />
                </svg>
              </div>
              <div class="outputActionBtn cutBtn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5}
                  stroke="currentColor" className="size-6">
                  <path strokeLinecap="round" strokeLinejoin="round"
                    d="m7.848 8.25 1.536.887M7.848 8.25a3 3 0 1 1-5.196-3 3 3 0 0 1 5.196 3Zm1.536.887a2.165 2.165 0 0 1 1.083 1.839c.005.351.054.695.14 1.024M9.384 9.137l2.077 1.199M7.848 15.75l1.536-.887m-1.536.887a3 3 0 1 1-5.196 3 3 3 0 0 1 5.196-3Zm1.536-.887a2.165 2.165 0 0 0 1.083-1.838c.005-.352.054-.695.14-1.025m-1.223 2.863 2.077-1.199m0-3.328a4.323 4.323 0 0 1 2.068-1.379l5.325-1.628a4.5 4.5 0 0 1 2.48-.044l.803.215-7.794 4.5m-2.882-1.664A4.33 4.33 0 0 0 10.607 12m3.736 0 7.794 4.5-.802.215a4.5 4.5 0 0 1-2.48-.043l-5.326-1.629a4.324 4.324 0 0 1-2.068-1.379M14.343 12l-2.882 1.664" />
                </svg>

              </div>
            </div>

          </div>
          <textarea class="rough" cols="2" wrap="hard"></textarea>

        </div>

      </div>
    </div>
    <p class="notebook"></p>
  </div>

  <script src="./utils.js"></script>
  <script src="./query.js"></script>
  <script src="./maker.js"></script>
  <script src="./app.js"></script>
</body>

</html>
